<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Demo template — Cartoleria Maria Elena · Alessandro Giacobbi</title>
  <meta name="description" content="Anteprima interattiva del demo template per Cartoleria (tier Express). Esempio di stile, non lavoro commissionato.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { background: var(--paper); color: var(--ink); font-family: var(--fb); user-select: none; -webkit-user-select: none; display: grid; grid-template-rows: auto 1fr; height: 100vh; overflow: hidden; }
    a { color: inherit; text-decoration: none; }

    .demo-bar { z-index: 50; background: var(--paper); border-bottom: 1px solid var(--rule); padding: 0.7rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .demo-bar__left { display: flex; align-items: center; gap: 0.9rem; flex-wrap: wrap; }
    .demo-bar__back { font-family: var(--fm); font-size: var(--fz-meta); letter-spacing: 0.08em; text-transform: uppercase; color: var(--ox); }
    .demo-bar__back:hover { text-decoration: underline; }
    .demo-bar__title { font-family: var(--fd); font-size: 1rem; font-weight: 700; color: var(--ink); }
    .demo-bar__tier { font-family: var(--fm); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--paper); background: var(--ox); padding: 0.3rem 0.6rem; }
    .demo-bar__sep { color: var(--mute); font-family: var(--fm); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
    .demo-bar__note { font-family: var(--fm); font-size: 10px; letter-spacing: 0.06em; color: var(--mute); font-style: italic; }
    .demo-bar__cta { font-family: var(--fm); font-size: var(--fz-meta); letter-spacing: 0.08em; text-transform: uppercase; color: var(--paper); background: var(--ink); padding: 0.55rem 1rem; transition: background 200ms; }
    .demo-bar__cta:hover { background: var(--ox); }

    .demo-stage { position: relative; background: var(--paper); overflow: hidden; }
    .demo-frame { position: relative; width: 100%; height: 100%; overflow: hidden; }
    .demo-frame__loader { position: absolute; inset: 0; display: grid; place-items: center; background: var(--paper); color: var(--mute); font-family: var(--fm); font-size: var(--fz-meta); letter-spacing: 0.1em; text-transform: uppercase; z-index: 2; transition: opacity 400ms; }
    .demo-frame__loader::after { content: ''; width: 24px; height: 24px; border: 2px solid var(--ox); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 0.7rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .demo-frame__loader.is-hidden { opacity: 0; pointer-events: none; }
    .demo-frame__iframe { width: 100%; height: 100%; border: 0; display: block; background: var(--paper); }

    /* Watermark overlay diagonale ripetuto sopra l'iframe */
    .demo-frame__overlay {
      position: absolute; inset: 0; pointer-events: none; z-index: 3;
      background-image: repeating-linear-gradient(
        -28deg,
        transparent 0,
        transparent 360px,
        rgba(184,50,63,0.04) 360px,
        rgba(184,50,63,0.04) 362px
      );
      mix-blend-mode: multiply;
    }
    .demo-frame__watermark { position: absolute; top: 14px; right: 14px; font-family: var(--fm); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--paper); background: rgba(184,50,63,0.85); padding: 0.4rem 0.7rem; pointer-events: none; z-index: 4; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

    @media (max-width: 767px) {
      .demo-bar { padding: 0.55rem 0.9rem; gap: 0.5rem; }
      .demo-bar__title { font-size: 0.92rem; }
      .demo-bar__note { display: none; }
      .demo-bar__cta { padding: 0.45rem 0.75rem; }
    }
  </style>
</head>
<body>

  <header class="demo-bar">
    <div class="demo-bar__left">
      <a href="../../#web-design" class="demo-bar__back">&larr; Portfolio</a>
      <span class="demo-bar__sep">/</span>
      <span class="demo-bar__title">Cartoleria Maria Elena</span>
      <span class="demo-bar__tier">Express</span>
      <span class="demo-bar__note">Demo &middot; non commissionato</span>
    </div>
    <a href="../../#contact" class="demo-bar__cta">Parliamone &rarr;</a>
  </header>

  <main class="demo-stage">
    <div class="demo-frame">
      <span class="demo-frame__watermark">Demo &middot; Cartoleria</span>
      <div class="demo-frame__loader" id="demo-loader">Loading demo</div>
      <iframe class="demo-frame__iframe" id="demo-iframe" sandbox="allow-scripts allow-popups allow-popups-to-escape-sandbox allow-forms" allowfullscreen referrerpolicy="no-referrer" title="Demo template Cartoleria Maria Elena"></iframe>
      <div class="demo-frame__overlay" aria-hidden="true"></div>
    </div>
  </main>

  <script>
    (function(){
      // Decode XOR + base64 (UTF-8 safe) → blob URL → iframe.src
      var K = 'ALEXG-2026-PORTFOLIO-DEMO';
      fetch('./_data.b64', { cache: 'no-cache' })
        .then(function(r){ if(!r.ok) throw new Error('404'); return r.text(); })
        .then(function(b64){
          var binary = atob(b64.replace(/\s/g,''));
          var bytes = new Uint8Array(binary.length);
          for (var i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i) ^ K.charCodeAt(i % K.length);
          var html = new TextDecoder('utf-8').decode(bytes);
          var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
          var url = URL.createObjectURL(blob);
          var f = document.getElementById('demo-iframe');
          f.addEventListener('load', function(){
            var loader = document.getElementById('demo-loader');
            if (loader) loader.classList.add('is-hidden');
            // Revoca URL dopo 60s per scoraggiare estrazione blob URL diretta
            setTimeout(function(){ try { URL.revokeObjectURL(url); } catch(e){} }, 60000);
          }, { once: true });
          f.src = url;
        })
        .catch(function(){
          var loader = document.getElementById('demo-loader');
          if (loader) loader.textContent = 'Demo non disponibile.';
        });

      // Deterrenti: right-click, drag, Ctrl+S, Ctrl+U, Ctrl+P, F12, Ctrl+Shift+I/J/C
      document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
      document.addEventListener('dragstart',  function(e){ e.preventDefault(); });
      document.addEventListener('keydown', function(e){
        var k = (e.key || '').toLowerCase();
        if (k === 'f12') { e.preventDefault(); return; }
        if ((e.ctrlKey || e.metaKey) && !e.shiftKey && (k === 's' || k === 'u' || k === 'p')) { e.preventDefault(); return; }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) { e.preventDefault(); return; }
      });
    })();
  </script>

</body>
</html>
