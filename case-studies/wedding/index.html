<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Demo template — Sposi del Lago · Alessandro Giacobbi</title>
  <meta name="description" content="Anteprima statica del demo template per Wedding Planner (tier Boutique). Esempio di stile, non lavoro commissionato.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <style>
    body { background: var(--paper); color: var(--ink); font-family: var(--fb); margin: 0; }
    a { color: inherit; text-decoration: none; }
    .demo-bar { position: sticky; top: 0; z-index: 50; background: var(--paper); border-bottom: 1px solid var(--rule); padding: 0.9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; backdrop-filter: blur(6px); }
    .demo-bar__left { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .demo-bar__back { font-family: var(--fm); font-size: var(--fz-meta); letter-spacing: 0.08em; text-transform: uppercase; color: var(--ox); }
    .demo-bar__back:hover { text-decoration: underline; }
    .demo-bar__title { font-family: var(--fd); font-size: 1.05rem; font-weight: 700; color: var(--ink); }
    .demo-bar__tier { font-family: var(--fm); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--paper); background: var(--ox); padding: 0.3rem 0.6rem; }
    .demo-bar__cta { font-family: var(--fm); font-size: var(--fz-meta); letter-spacing: 0.08em; text-transform: uppercase; color: var(--paper); background: var(--ink); padding: 0.6rem 1rem; transition: background 200ms; }
    .demo-bar__cta:hover { background: var(--ox); }
    .demo-frame { padding: 0; background: var(--paper2); }
    .demo-frame__inner { max-width: 1280px; margin: 0 auto; position: relative; }
    .demo-frame__img { display: block; width: 100%; height: auto; box-shadow: 0 10px 40px -8px rgba(22,19,16,0.18); user-select: none; -webkit-user-drag: none; pointer-events: none; }
    .demo-frame__watermark { position: absolute; top: 24px; right: 24px; font-family: var(--fm); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--paper); background: rgba(184,50,63,0.88); padding: 0.4rem 0.8rem; pointer-events: none; z-index: 2; }
    .demo-foot { padding: 4rem 1.5rem; background: var(--ink); color: var(--paper); text-align: center; }
    .demo-foot__title { font-family: var(--fd); font-size: clamp(1.5rem, 3vw, 2.5rem); font-weight: 700; line-height: 1.1; margin: 0 0 1.25rem 0; }
    .demo-foot__title em { font-family: var(--fs, Georgia, serif); font-style: italic; color: var(--ox); font-weight: 400; }
    .demo-foot__cta { display: inline-block; font-family: var(--fm); font-size: var(--fz-mono); letter-spacing: 0.04em; text-transform: uppercase; color: var(--paper); background: var(--ox); padding: 1rem 1.6rem; transition: background 200ms; }
    .demo-foot__cta:hover { background: var(--ox-deep, #8a2530); }
    .demo-foot__note { font-family: var(--fm); font-size: var(--fz-meta); letter-spacing: 0.06em; color: rgba(237,230,214,0.55); margin: 1.75rem auto 0 auto; max-width: 60ch; line-height: 1.55; font-style: italic; }
  </style>
</head>
<body>
  <header class="demo-bar">
    <div class="demo-bar__left">
      <a href="../../#web-design" class="demo-bar__back">&larr; Torna al portfolio</a>
      <span class="demo-bar__title">Demo &middot; Sposi del Lago</span>
      <span class="demo-bar__tier">Boutique</span>
    </div>
    <a href="../../#contact" class="demo-bar__cta">Parliamone &rarr;</a>
  </header>
  <main class="demo-frame">
    <div class="demo-frame__inner">
      <span class="demo-frame__watermark">Demo &middot; non commissionato</span>
      <img class="demo-frame__img" src="../../assets/img/case-studies/wedding-full.jpg" alt="Demo template per Wedding Planner (tier Boutique)" loading="eager" oncontextmenu="return false;">
    </div>
  </main>
  <footer class="demo-foot">
    <h2 class="demo-foot__title">Vuoi un sito cos&igrave;, <em>cucito sulla tua attivit&agrave;?</em></h2>
    <a href="../../#contact" class="demo-foot__cta">Parliamone &rarr;</a>
    <p class="demo-foot__note">Questo &egrave; uno screenshot di un template di esempio per il settore Wedding Planner (tier Boutique). Non &egrave; un lavoro fatto per un cliente reale.</p>
  </footer>
</body>
</html>
